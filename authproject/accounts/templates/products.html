<!DOCTYPE html>
<html>
<head>
    <title>Products</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background: #f1f3f6;
            font-family: Arial, sans-serif;
        }

        /* NAVBAR */
        .navbar {
            background: #2874f0;
            padding: 10px 20px;
        }

        .navbar-brand {
            font-weight: bold;
            color: white;
        }

        /* CARD */
        .card {
            border: none;
            border-radius: 8px;
            background: white;
            transition: 0.3s;
            text-align: center;
        }

        .card:hover {
            transform: scale(1.03);
            box-shadow: 0 4px 20px rgba(0,0,0,0.1);
        }

        /* IMAGE */
        .product-img {
            height: 200px;
            object-fit: contain;
        }

        /* PRICE */
        .price {
            color: #388e3c;
            font-weight: bold;
        }

        /* BUTTON */
        .btn-cart {
            background: #ff9f00;
            color: white;
            border: none;
        }

        .btn-cart:hover {
            background: #fb8c00;
        }

        .title {
            font-size: 14px;
            min-height: 40px;
        }
    </style>
</head>

<body>

<!-- NAVBAR -->
<nav class="navbar navbar-dark">
    <a href="{% url 'dashboard' %}" class="navbar-brand">🛒 MyStore</a>

    <div>
        <a href="{% url 'cart' %}" class="btn btn-light btn-sm me-2">Cart</a>
        <a href="{% url 'logout' %}" class="btn btn-danger btn-sm">Logout</a>
    </div>
</nav>

<div class="container mt-4">

    <h4 class="mb-3">🛍 Products</h4>

    <div class="row">

        {% for product in products %}
        <div class="col-md-3 col-sm-6 mb-4">

            <div class="card p-3 shadow-sm">

                <!-- IMAGE -->
                {% if product.image %}
                    <img src="{{ product.image.url }}" class="product-img w-100 mb-2">
                {% elif product.image_url %}
                    <img src="{{ product.image_url }}" class="product-img w-100 mb-2"
                        onerror="this.src='https://picsum.photos/300'">
                {% else %}
                    <img src="https://picsum.photos/300" class="product-img w-100 mb-2">
                {% endif %}

                <!-- NAME -->
            <a href="{% url 'product_detail' product.id %}" class="text-decoration-none text-dark">
            <p class="title">{{ product.name }}</p>
            </a>

                <!-- PRICE -->
                <p class="price">₹ {{ product.price }}</p>

                <!-- BUTTON -->
                <a href="{% url 'add_to_cart' product.id %}" 
                class="btn btn-cart w-100">
                    Add to Cart
                </a>

            </div>

        </div>
        {% endfor %}

    </div>

</div>

</body>
</html>
