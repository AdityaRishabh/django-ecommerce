<!DOCTYPE html>
<html>
<head>
    <title>Orders</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background: #f1f3f6;
            font-family: Arial, sans-serif;
        }

        /* NAVBAR */
        .navbar {
            background: #2874f0;
            padding: 10px 20px;
        }

        .navbar-brand {
            font-weight: bold;
            color: white;
        }

        /* CARD */
        .orders-card {
            background: white;
            border-radius: 8px;
            padding: 20px;
        }

        /* TABLE */
        .table th {
            background: #2874f0;
            color: white;
        }

        .table td {
            vertical-align: middle;
        }

        /* PRICE */
        .price {
            color: #388e3c;
            font-weight: bold;
        }

        /* BUTTON */
        .btn-view {
            background: #2874f0;
            color: white;
            border: none;
        }

        .btn-view:hover {
            background: #1c5ecb;
        }

        /* BADGE */
        .badge {
            font-size: 12px;
            padding: 6px 10px;
        }
    </style>
</head>

<body>

<!-- NAVBAR -->
<nav class="navbar navbar-dark px-4">
    <a href="{% url 'dashboard' %}" class="navbar-brand">🛒 MyStore</a>

    <div>
        <a href="{% url 'cart' %}" class="btn btn-light btn-sm me-2">Cart</a>
        <a href="{% url 'logout' %}" class="btn btn-danger btn-sm">Logout</a>
    </div>
</nav>

<div class="container mt-4">

    <h4 class="mb-3"> Your Orders</h4>

    <div class="orders-card shadow-sm">

        <table class="table align-middle">
            <thead>
                <tr>
                    <th>Order ID</th>
                    <th>Total</th>
                    <th>Status</th>
                    <th>Date</th>
                    <th>View</th>
                </tr>
            </thead>

            <tbody>

                {% for order in orders %}
                <tr>
                    <td><b>#{{ order.id }}</b></td>

                    <td class="price">₹ {{ order.total_amount }}</td>

                    <td>
                        <span class="badge bg-info text-dark">
                            {{ order.status }}
                        </span>
                    </td>

                    <td>{{ order.created_at|date:"d M Y" }}</td>

                    <td>
                        <a href="{% url 'order_detail' order.id %}" 
                           class="btn btn-view btn-sm">
                            View
                        </a>
                    </td>
                </tr>
                {% empty %}
                <tr>
                    <td colspan="5" class="text-center text-muted">
                        No orders yet
                    </td>
                </tr>
                {% endfor %}

            </tbody>
        </table>

    </div>

    <a href="{% url 'dashboard' %}" class="btn btn-secondary mt-3">
        Back to Dashboard
    </a>

</div>

</body>
</html>
