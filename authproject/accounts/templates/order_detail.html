<!DOCTYPE html>
<html>
<head>
    <title>Order Detail</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background: #f1f3f6;
            font-family: Arial, sans-serif;
        }

        /* NAVBAR */
        .navbar {
            background: #2874f0;
            padding: 10px 20px;
        }

        .navbar-brand {
            font-weight: bold;
            color: white;
        }

        /* CARD */
        .detail-card {
            background: white;
            border-radius: 8px;
            padding: 20px;
        }

        /* TABLE */
        .table th {
            background: #2874f0;
            color: white;
        }

        /* PRICE */
        .price {
            color: #388e3c;
            font-weight: bold;
        }

        /* BADGE */
        .badge {
            font-size: 12px;
            padding: 6px 10px;
        }

        /* BUTTON */
        .btn-back {
            background: #6c757d;
            color: white;
        }

        .btn-back:hover {
            background: #5a6268;
        }
    </style>
</head>

<body>

<!-- NAVBAR -->
<nav class="navbar navbar-dark px-4">
    <a href="{% url 'dashboard' %}" class="navbar-brand">🛒 MyStore</a>

    <div>
        <a href="{% url 'cart' %}" class="btn btn-light btn-sm me-2">Cart</a>
        <a href="{% url 'logout' %}" class="btn btn-danger btn-sm">Logout</a>
    </div>
</nav>

<div class="container mt-4">

    <h4 class="mb-3">📦 Order #{{ order.id }}</h4>

    <div class="detail-card shadow-sm mb-4">

        <p>
            <strong>Status:</strong> 
            <span class="badge bg-success">
                {{ order.status }}
            </span>
        </p>

        <p>
            <strong>Total:</strong> 
            <span class="price">₹ {{ order.total_amount }}</span>
        </p>

    </div>

    <div class="detail-card shadow-sm">

        <h5 class="mb-3">Items</h5>

        <table class="table align-middle">
            <thead>
                <tr>
                    <th>Product</th>
                    <th>Quantity</th>
                </tr>
            </thead>

            <tbody>
                {% for item in items %}
                <tr>
                    <td class="fw-semibold">{{ item.product.name }}</td>
                    <td>{{ item.quantity }}</td>
                </tr>
                {% endfor %}
            </tbody>
        </table>

    </div>

    <a href="{% url 'orders' %}" class="btn btn-back mt-3">
        Back to Orders
    </a>

</div>

</body>
</html>
