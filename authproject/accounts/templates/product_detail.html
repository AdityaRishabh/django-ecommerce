<!DOCTYPE html>
<html>
<head>
    <title>Product Detail</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background: #f1f3f6;
            font-family: Arial, sans-serif;
        }

        .navbar {
            background: #2874f0;
            padding: 10px 20px;
        }

        .navbar-brand {
            color: white;
            font-weight: bold;
        }

        .product-container {
            background: white;
            border-radius: 8px;
            padding: 20px;
        }

        .product-img {
            height: 350px;
            object-fit: contain;
        }

        .price {
            color: #388e3c;
            font-size: 22px;
            font-weight: bold;
        }

        .btn-cart {
            background: #ff9f00;
            color: white;
            border: none;
        }

        .btn-buy {
            background: #fb641b;
            color: white;
            border: none;
        }

        .btn-wishlist {
            border: 1px solid #ccc;
        }

        .rating {
            color: #ffc107;
            font-size: 18px;
        }
    </style>
</head>

<body>

<!-- NAVBAR -->
<nav class="navbar navbar-dark">
    <a href="{% url 'dashboard' %}" class="navbar-brand">🛒 MyStore</a>

    <div>
        <a href="{% url 'cart' %}" class="btn btn-light btn-sm me-2">Cart</a>
        <a href="{% url 'logout' %}" class="btn btn-danger btn-sm">Logout</a>
    </div>
</nav>

<div class="container mt-4">

<div class="product-container shadow-sm">

    <div class="row">

        <!-- IMAGE -->
        <div class="col-md-5 text-center">

            {% if product.image %}
                <img src="{{ product.image.url }}" class="product-img">
            {% elif product.image_url %}
                <img src="{{ product.image_url }}" class="product-img"
                    onerror="this.src='https://picsum.photos/400'">
            {% else %}
                <img src="https://picsum.photos/400" class="product-img">
            {% endif %}

        </div>

        <!-- DETAILS -->
        <div class="col-md-7">

            <h4>{{ product.name }}</h4>

            <!-- ⭐ RATING -->
            <div class="rating mb-2">
                ★★★★☆
            </div>

            <p class="price">₹ {{ product.price }}</p>

            <p class="text-muted">
                {{ product.description|default:"No description available" }}
            </p>

            <p><b>Stock:</b> {{ product.stock }}</p>

            <!-- BUTTONS -->
            <div class="mt-3">

                <a href="{% url 'add_to_cart' product.id %}" 
                class="btn btn-cart me-2">
                    Add to Cart
                </a>

                <a href="{% url 'checkout' %}" 
                class="btn btn-buy me-2">
                    Buy Now
                </a>

                <button class="btn btn-wishlist">
                    ❤️ Wishlist
                </button>

            </div>

        </div>

    </div>

</div>

</div>

</body>
</html>
